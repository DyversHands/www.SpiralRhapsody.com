# UI configs
title: "Spiral Rhapsody"
# subtitle: ""
author: "Dyvers Hands Productions, LLC"
header:
 title: "A Spiral Rhapsody"
 author: "Curated by Christopher Allen"
footer:
 name: "A Spiral Rhapsody"
 bio: |
   "the intervals change.
   the notes braid into a fugue.
   a major charges forward.
   a minor follows,
   descending toward a conclusion.
   then the up-and-down turns left.
   and i forget to breathe.
   i'm dizzy with a kind of living.
   i am a thread of things spun loose
   and coiling back on themselves.
   in a spiral rhapsody. " -- Christopher Allen
web_design: "Christopher Allen"
social_urls:
  twitter: "https://www.twitter.com/DyversHands"
  github: "https://www.github.com/DyversHands"

# Configure which exif data to display
# Tag is the actual exif tag, icon is a fontawesome icon. Use JSON notation without line breaks
exif: '[{"tag": "Model", "icon": "fa fa-camera-retro"}, {"tag": "FNumber", "icon": "far fa-dot-circle"}, {"tag": "ExposureTime", "icon": "far fa-clock"}, {"tag": "ISOSpeedRatings", "icon": "fa fa-info-circle"}]'

